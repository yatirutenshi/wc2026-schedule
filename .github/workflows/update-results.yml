name: W杯結果の自動更新

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update matches.json
        run: node scripts/update-results.mjs
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}

      - name: Commit and push if changed
        run: |
          if git diff --quiet matches.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name "wc-results-bot"
          git config user.email "actions@users.noreply.github.com"
          git add matches.json
          git commit -m "Update results $(TZ=Asia/Tokyo date +'%m/%d %H:%M JST')"
          git push
